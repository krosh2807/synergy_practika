{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Приветствие</title>
  <link rel="stylesheet" href="{% static 'greetings/style.css' %}">
</head>
<body>
  <div class="container">
    <h1>Добро пожаловать!</h1>

    {% if greeting_name %}
      <p class="greeting">Привет, {{ greeting_name }}!</p>
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      {{ form.name }}
      {% if form.name.errors %}
        <p class="error">{{ form.name.errors.0 }}</p>
      {% endif %}
      <button type="submit" class="submit-btn">Submit</button>
    </form>
  </div>
</body>
</html>
