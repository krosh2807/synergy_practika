<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Счётчик (Counter)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="counter-box" id="result">0</div>

    <div class="buttons">
      <button id="minus-btn" class="btn">−</button>
      <button id="plus-btn" class="btn">+</button>
    </div>

    <div class="message-box" id="message"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
