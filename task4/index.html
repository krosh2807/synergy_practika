<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Интерактивный калькулятор</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <h1>Калькулятор</h1>

    <input type="text" id="num1" class="input-field" placeholder="Первое число">
    <input type="text" id="num2" class="input-field" placeholder="Второе число">

    <div class="buttons">
      <button id="sum-btn" class="btn">сумма</button>
      <button id="diff-btn" class="btn">разность</button>
      <button id="mult-btn" class="btn">произведение</button>
      <button id="div-btn" class="btn">деление</button>
    </div>

    <div id="result" class="result-box">Результат</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
